<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robots — Granja Terri</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 1.2rem; max-width: 480px; margin: 0 auto; }
    h1 { font-size: 1.2rem; font-weight: 500; margin-bottom: 2px; }
    .sub { font-size: 12px; color: #888; margin-bottom: 1rem; }
    .filter-bar { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
    .fbtn { padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 12px; color: #666; cursor: pointer; }
    .fbtn.on { background: #222; color: white; border-color: #222; }
    .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1rem; }
    .kpi { background: #eee; border-radius: 10px; padding: 10px 12px; }
    .kpi-lbl { font-size: 11px; color: #666; margin-bottom: 3px; }
    .kpi-val { font-size: 20px; font-weight: 500; }
    .kpi-sub { font-size: 10px; color: #999; margin-top: 2px; }
    .card { background: white; border-radius: 12px; border: 1px solid #eee; padding: 14px 16px; margin-bottom: 10px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-title { font-size: 13px; font-weight: 500; }
    .card-sub { font-size: 11px; color: #888; margin-top: 1px; }
    .score-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
    .score-a { background: #E1F5EE; color: #085041; }
    .score-b { background: #FAEEDA; color: #633806; }
    .score-c { background: #FCEBEB; color: #791F1F; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .row:last-child { margin-bottom: 0; }
    .row-lbl { font-size: 11px; color: #888; width: 120px; flex-shrink: 0; }
    .bar-bg { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .row-val { font-size: 12px; font-weight: 500; width: 60px; text-align: right; flex-shrink: 0; }
    .divider { height: 1px; background: #f0f0f0; margin: 10px 0; }
    .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .time-cell { background: #f5f5f5; border-radius: 8px; padding: 8px; text-align: center; }
    .time-val { font-size: 15px; font-weight: 500; }
    .time-lbl { font-size: 10px; color: #888; margin-top: 2px; }
    .donuts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
    .donut-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 12px; }
    .donut-title { font-size: 12px; font-weight: 500; text-align: center; margin-bottom: 8px; }
    .donut-wrap { position: relative; width: 100%; height: 120px; }
    .chart-wrap { position: relative; width: 100%; height: 160px; margin-top: 8px; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; justify-content: center; }
    .leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #666; }
    .leg-sq { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
    .section-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
  </style>
</head>
<body>

<h1>Robots VMS — Granja Terri</h1>
<p class="sub" id="periodo">Cargando...</p>

<div class="filter-bar" id="filters"></div>
<div class="kpi-grid" id="kpis"></div>
<div id="robots-list"></div>

<div class="card">
  <div class="section-title">Distribución del tiempo</div>
  <div class="legend">
    <span class="leg-item"><span class="leg-sq" style="background:#1D9E75"></span>Ordeño</span>
    <span class="leg-item"><span class="leg-sq" style="background:#378ADD"></span>Lavado</span>
    <span class="leg-item"><span class="leg-sq" style="background:#EF9F27"></span>Libre</span>
    <span class="leg-item"><span class="leg-sq" style="background:#E24B4A"></span>Avería</span>
  </div>
  <div class="donuts-grid" id="donuts-grid"></div>
</div>

<div class="card">
  <div class="card-header">
    <div>
      <div class="card-title">Litros por día</div>
      <div class="card-sub">Evolución últimos 30 días</div>
    </div>
  </div>
  <div class="chart-wrap">
    <canvas id="chartLitros"></canvas>
  </div>
</div>

<script>
const API = 'https://milking-intelligence-production.up.railway.app';
const COLORES = ['#1D9E75','#378ADD','#7F77DD'];
const DONUT_COLORS = ['#1D9E75','#378ADD','#EF9F27','#E24B4A'];

let datos = [];
let evolucion = {};
let filtro = 'todos';
let chartL;
const donutCharts = {};

function calcTiempos(r) {
  const box = r.tiempo_box_seg || 0;
  const lav = r.tiempo_lavado_seg || 0;
  const lib = r.tiempo_libre_seg || 0;
  const ave = r.tiempo_averia_seg || 0;
  const total = box + lav + lib + ave;
  if (total === 0) return { ord: 0, lav: 0, lib: 0, ave: 0 };
  return {
    ord: Math.max(0, Math.round((box - lav) / total * 100)),
    lav: Math.round(lav / total * 100),
    lib: Math.round(lib / total * 100),
    ave: Math.round(ave / total * 100)
  };
}

function scoreRobot(r) {
  const inc = r.incompletos_dia || 0;
  const kick = r.kickoffs_dia || 0;
  if (inc < 2 && kick < 4) return { score: 'A', label: 'Excelente' };
  if (inc < 4 && kick < 6) return { score: 'B', label: 'Bueno' };
  return { score: 'C', label: 'Mejorable' };
}

function fmtFecha(f) {
  if (!f) return '-';
  const [y, m, d] = f.split('T')[0].split('-');
  return `${d}-${m}-${y}`;
}

function cargarRobots(farm_id) {
  Promise.all([
    fetch(`${API}/robots/${farm_id}`).then(r => r.json()),
    fetch(`${API}/robots/${farm_id}/evolucion`).then(r => r.json())
  ]).then(([robots, evol]) => {
    datos = robots;

    // Reconstruir objeto evolucion por milking_device
    evolucion = {};
    evol.forEach(row => {
      const key = String(row.milking_device ?? 'total');
      if (!evolucion[key]) evolucion[key] = { fechas: [], litros: [] };
      evolucion[key].fechas.push(row.fecha);
      evolucion[key].litros.push(row.litros);
    });

    const total = datos.find(r => r.milking_device === null);
    const robotsList = datos.filter(r => r.milking_device !== null);

    if (total) {
      document.getElementById('periodo').textContent =
        `Período: ${fmtFecha(total.fecha_inicio)} → ${fmtFecha(total.fecha_fin)}`;
    }

    window._total = total;
    window._robots = robotsList;

    filtro = 'todos';
    cambiarFiltro('todos');
  });
}

function renderFiltros() {
  const robots = window._robots || [];
  document.getElementById('filters').innerHTML =
    [{ key: 'todos', label: 'Todos' }, ...robots.map(r => ({ key: String(r.milking_device), label: r.nombre_robot }))]
    .map(f => `<button class="fbtn${filtro === f.key ? ' on' : ''}" onclick="cambiarFiltro('${f.key}')">${f.label}</button>`)
    .join('');
}

function renderKPIs() {
  const robots = window._robots || [];
  const total = window._total;
  let d = filtro === 'todos' ? (total || {}) : (robots.find(r => String(r.milking_device) === filtro) || {});

  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-lbl">Litros/día</div><div class="kpi-val">${(d.litros_dia||0).toLocaleString('es-ES',{maximumFractionDigits:0})}</div><div class="kpi-sub">litros totales</div></div>
    <div class="kpi"><div class="kpi-lbl">Ordeños/día</div><div class="kpi-val">${Math.round(d.ord_dia||0)}</div><div class="kpi-sub">visitas robot</div></div>
    <div class="kpi"><div class="kpi-lbl">Tiempo conexión</div><div class="kpi-val">${Math.round(d.tiempo_conexion||0)} seg</div><div class="kpi-sub">media por ordeño</div></div>
    <div class="kpi"><div class="kpi-lbl">Incompletos</div><div class="kpi-val">${(d.incompletos_dia||0).toFixed(1)}%</div><div class="kpi-sub" style="color:${(d.incompletos_dia||0)<2?'#0F6E56':'#854F0B'}">sobre total ordeños</div></div>
  `;
}

function renderRobots() {
  const robots = window._robots || [];
  const lista = filtro === 'todos' ? robots : robots.filter(r => String(r.milking_device) === filtro);
  const maxLitros = Math.max(...robots.map(r => r.litros_dia || 0));
  const maxOrds = Math.max(...robots.map(r => r.ord_dia || 0));

  document.getElementById('robots-list').innerHTML = lista.map((r, i) => {
    const sc = scoreRobot(r);
    const t = calcTiempos(r);
    return `
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">${r.nombre_robot}</div><div class="card-sub">${Math.round(r.ord_dia||0)} ordeños · ${(r.litros_dia||0).toLocaleString('es-ES',{maximumFractionDigits:0})} L/día</div></div>
        <span class="score-badge score-${sc.score.toLowerCase()}">${sc.score} — ${sc.label}</span>
      </div>
      <div class="row"><div class="row-lbl">Litros/día</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.round((r.litros_dia||0)/maxLitros*100)}%;background:${COLORES[i]}"></div></div><div class="row-val">${(r.litros_dia||0).toLocaleString('es-ES',{maximumFractionDigits:0})} L</div></div>
      <div class="row"><div class="row-lbl">Ordeños/día</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.round((r.ord_dia||0)/maxOrds*100)}%;background:${COLORES[i]}"></div></div><div class="row-val">${Math.round(r.ord_dia||0)}</div></div>
      <div class="row"><div class="row-lbl">Kickoffs/día</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,Math.round((r.kickoffs_dia||0)/10*100))}%;background:${(r.kickoffs_dia||0)<4?'#1D9E75':'#EF9F27'}"></div></div><div class="row-val">${(r.kickoffs_dia||0).toFixed(1)}</div></div>
      <div class="row"><div class="row-lbl">Incompletos/día</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,Math.round((r.incompletos_dia||0)/10*100))}%;background:${(r.incompletos_dia||0)<2?'#1D9E75':'#EF9F27'}"></div></div><div class="row-val">${(r.incompletos_dia||0).toFixed(1)}%</div></div>
      <div class="row"><div class="row-lbl">Tiempo conexión</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,Math.round((r.tiempo_conexion||0)/200*100))}%;background:${COLORES[i]}"></div></div><div class="row-val">${Math.round(r.tiempo_conexion||0)} seg</div></div>
      <div class="divider"></div>
      <div class="time-grid">
        <div class="time-cell"><div class="time-val">${t.ord}%</div><div class="time-lbl">Ordeño</div></div>
        <div class="time-cell"><div class="time-val">${t.lav}%</div><div class="time-lbl">Lavado</div></div>
        <div class="time-cell"><div class="time-val">${t.lib}%</div><div class="time-lbl">Libre</div></div>
        <div class="time-cell"><div class="time-val" style="color:${t.ave>3?'#A32D2D':'#222'}">${t.ave}%</div><div class="time-lbl">Avería</div></div>
      </div>
    </div>`;
  }).join('');
}

function renderDonuts() {
  const robots = window._robots || [];
  const lista = filtro === 'todos' ? robots : robots.filter(r => String(r.milking_device) === filtro);

  Object.values(donutCharts).forEach(c => c.destroy());
  Object.keys(donutCharts).forEach(k => delete donutCharts[k]);

  document.getElementById('donuts-grid').innerHTML = lista.map(r =>
    `<div class="donut-card"><div class="donut-title">${r.nombre_robot}</div><div class="donut-wrap"><canvas id="donut-${r.milking_device}"></canvas></div></div>`
  ).join('');

  lista.forEach(r => {
    const t = calcTiempos(r);
    donutCharts[r.milking_device] = new Chart(document.getElementById(`donut-${r.milking_device}`), {
      type: 'doughnut',
      data: {
        labels: ['Ordeño','Lavado','Libre','Avería'],
        datasets: [{ data: [t.ord, t.lav, t.lib, t.ave], backgroundColor: DONUT_COLORS, borderWidth: 0, hoverOffset: 4 }]
      },
      options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { display: false } } }
    });
  });
}

function renderChartLitros() {
  if (chartL) chartL.destroy();
  const robots = window._robots || [];
  const lista = filtro === 'todos' ? robots : robots.filter(r => String(r.milking_device) === filtro);

  const datasets = lista.map((r, i) => {
    const key = String(r.milking_device);
    const evol = evolucion[key] || { fechas: [], litros: [] };
    return { label: r.nombre_robot, data: evol.litros, borderColor: COLORES[i], backgroundColor: 'transparent', borderWidth: 2, pointRadius: 2, tension: 0.3 };
  });

  const primeraKey = lista.length > 0 ? String(lista[0].milking_device) : null;
  const fechas = primeraKey && evolucion[primeraKey] ? evolucion[primeraKey].fechas.map(f => { const [y,m,d] = f.split('-'); return `${d}/${m}`; }) : [];

  chartL = new Chart(document.getElementById('chartLitros'), {
    type: 'line',
    data: { labels: fechas, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: lista.length > 1, position: 'top' } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 10, maxRotation: 0 } },
        y: { ticks: { callback: v => v.toLocaleString('es-ES') }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });
}

function cambiarFiltro(k) {
  filtro = k;
  renderFiltros();
  renderKPIs();
  renderRobots();
  renderDonuts();
  renderChartLitros();
}

// Selector de granjas
fetch(`${API}/granjas`).then(r => r.json()).then(granjas => {
  const sel = document.createElement('select');
  sel.style.cssText = 'margin-left:12px;padding:4px 8px;border-radius:6px;border:1px solid #ccc;font-size:14px;cursor:pointer';
  granjas.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.farm_id;
    opt.textContent = g.name;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', e => cargarRobots(e.target.value));
  document.getElementById('periodo').before(sel);
  cargarRobots(granjas[0].farm_id);
});
</script>
</body>
</html>
