<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchmark — Milking Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --verde: #1A7A4A;
    --verde-light: #E8F5EE;
    --amber: #D97706;
    --amber-light: #FEF3C7;
    --rojo: #DC2626;
    --rojo-light: #FEE2E2;
    --gris: #6B7280;
    --gris-light: #F3F4F6;
    --negro: #111827;
    --blanco: #FFFFFF;
    --borde: #E5E7EB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F9FAFB;
    color: var(--negro);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: var(--blanco);
    border-bottom: 1px solid var(--borde);
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 56px;
    gap: 32px;
  }
  .nav-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--verde);
    text-decoration: none;
    margin-right: auto;
  }
  nav a {
    font-size: 14px;
    font-weight: 500;
    color: var(--gris);
    text-decoration: none;
    padding: 4px 0;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  nav a:hover { color: var(--negro); }
  nav a.active { color: var(--verde); border-bottom-color: var(--verde); }

  /* HEADER */
  .header {
    padding: 40px 24px 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    color: var(--negro);
    margin-bottom: 6px;
  }
  .header p {
    font-size: 15px;
    color: var(--gris);
  }

  /* SCORE CARDS */
  .scores {
    max-width: 1100px;
    margin: 0 auto 32px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .score-card {
    background: var(--blanco);
    border: 1px solid var(--borde);
    border-radius: 16px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .score-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--verde);
  }
  .score-card.segundo::before { background: var(--amber); }
  .score-farm {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gris);
    margin-bottom: 12px;
  }
  .score-numero {
    font-family: 'DM Serif Display', serif;
    font-size: 72px;
    line-height: 1;
    color: var(--verde);
    margin-bottom: 4px;
  }
  .score-card.segundo .score-numero { color: var(--amber); }
  .score-label {
    font-size: 13px;
    color: var(--gris);
    margin-bottom: 20px;
  }
  .score-produccion {
    font-size: 22px;
    font-weight: 600;
    color: var(--negro);
  }
  .score-produccion span {
    font-size: 13px;
    font-weight: 400;
    color: var(--gris);
  }

  /* DIMENSIONES */
  .dimensiones {
    max-width: 1100px;
    margin: 0 auto 32px;
    padding: 0 24px;
  }
  .dimensiones h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 16px;
  }
  .dim-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 12px;
  }
  .dim-card {
    background: var(--blanco);
    border: 1px solid var(--borde);
    border-radius: 12px;
    padding: 20px;
  }
  .dim-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .dim-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .dim-title {
    font-weight: 600;
    font-size: 15px;
  }
  .dim-rows { display: flex; flex-direction: column; gap: 10px; }
  .dim-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dim-farm-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--gris);
    width: 100px;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .dim-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--gris-light);
    border-radius: 4px;
    overflow: hidden;
  }
  .dim-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
  }
  .dim-val {
    font-size: 13px;
    font-weight: 600;
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }
  .dim-sin-datos {
    font-size: 13px;
    color: var(--gris);
    font-style: italic;
    padding: 8px 0;
  }

  /* TABLA COMPARATIVA */
  .tabla-wrap {
    max-width: 1100px;
    margin: 0 auto 48px;
    padding: 0 24px;
  }
  .tabla-wrap h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 16px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--blanco);
    border: 1px solid var(--borde);
    border-radius: 12px;
    overflow: hidden;
  }
  th {
    background: var(--gris-light);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gris);
    padding: 12px 16px;
    text-align: left;
  }
  td {
    padding: 14px 16px;
    font-size: 14px;
    border-top: 1px solid var(--borde);
  }
  .mejor { color: var(--verde); font-weight: 600; }
  .peor { color: var(--rojo); }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 80px;
    color: var(--gris);
    font-size: 15px;
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="dashboard.html">Milking Intelligence</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="vacas.html">Vacas</a>
  <a href="robots.html">Robots</a>
  <a href="benchmark.html" class="active">Benchmark</a>
</nav>

<div class="header">
  <h1>Benchmark entre granjas</h1>
  <p id="subtitulo">Cargando datos...</p>
</div>

<div id="contenido"><div class="loading">Cargando benchmark...</div></div>

<script>
const API = 'https://milking-intelligence-production.up.railway.app';

function color(val, max) {
  const pct = Math.min(val / max, 1);
  return pct > 0.6 ? '#1A7A4A' : pct > 0.3 ? '#D97706' : '#DC2626';
}

function fmt(val, decimals = 2) {
  if (val === null || val === undefined) return '—';
  return Number(val).toFixed(decimals);
}

fetch(`${API}/benchmark`).then(r => r.json()).then(granjas => {
  if (!granjas.length) return;

  document.getElementById('subtitulo').textContent =
    `${granjas.length} granjas comparadas · Actualizado con último sync`;

  const maxScore = Math.max(...granjas.map(g => g.score_global || 0));
  const maxProd  = Math.max(...granjas.map(g => g.produccion_media || 0));
  const maxOrd   = Math.max(...granjas.map(g => g.ordenos_dia || 0));
  const minRech  = Math.min(...granjas.map(g => g.rechazos_dia || 999));
  const maxRech  = Math.max(...granjas.map(g => g.rechazos_dia || 0));
  const minInc   = Math.min(...granjas.map(g => g.incompletos_dia || 999));
  const maxInc   = Math.max(...granjas.map(g => g.incompletos_dia || 0));

  // ── Score cards ──────────────────────────────────────────────────────────
  const scoresHTML = granjas.map((g, i) => `
    <div class="score-card ${i > 0 ? 'segundo' : ''}">
      <div class="score-farm">${g.name}</div>
      <div class="score-numero">${fmt(g.score_global, 0)}</div>
      <div class="score-label">puntuación global / 100</div>
      <div class="score-produccion">${fmt(g.produccion_media)} kg <span>/ vaca / día</span></div>
    </div>
  `).join('');

  // ── Dimensiones ──────────────────────────────────────────────────────────
  const dims = [
    {
      icon: '🥛', titulo: 'Producción', bg: '#E8F5EE',
      filas: granjas.map(g => ({
        name: g.name,
        val: g.produccion_media,
        label: `${fmt(g.produccion_media)} kg/vaca/día`,
        pct: (g.produccion_media / maxProd) * 100,
        barColor: color(g.produccion_media, maxProd)
      }))
    },
    {
      icon: '🤖', titulo: 'Robot', bg: '#EAF2FB',
      filas: granjas.map(g => ({
        name: g.name,
        val: g.ordenos_dia,
        label: `${fmt(g.ordenos_dia)} ordeños/día`,
        pct: (g.ordenos_dia / maxOrd) * 100,
        barColor: color(g.ordenos_dia, maxOrd)
      }))
    },
    {
      icon: '⚠️', titulo: 'Rechazos', bg: '#FEF3C7',
      filas: granjas.map(g => ({
        name: g.name,
        val: g.rechazos_dia,
        label: `${fmt(g.rechazos_dia)} rechazos/día`,
        pct: maxRech > 0 ? ((maxRech - g.rechazos_dia) / maxRech) * 100 : 50,
        barColor: g.rechazos_dia === minRech ? '#1A7A4A' : '#DC2626'
      }))
    },
    {
      icon: '🔬', titulo: 'Calidad leche', bg: '#F3F4F6',
      sinDatos: granjas.every(g => !g.celulas_media)
    },
    {
      icon: '💚', titulo: 'Salud vacas', bg: '#F0FDF4',
      filas: granjas.map(g => ({
        name: g.name,
        val: g.kickoffs_media,
        label: g.kickoffs_media ? `${fmt(g.kickoffs_media)}% kickoffs` : '—',
        pct: g.kickoffs_media ? Math.max(0, 100 - g.kickoffs_media * 5) : 0,
        barColor: !g.kickoffs_media ? '#9CA3AF' : g.kickoffs_media < 5 ? '#1A7A4A' : g.kickoffs_media < 10 ? '#D97706' : '#DC2626'
      }))
    },
    {
      icon: '📊', titulo: 'Bienestar', bg: '#FDF4FF',
      sinDatos: granjas.every(g => !g.adaptibility_media)
    }
  ];

  const dimsHTML = dims.map(d => `
    <div class="dim-card">
      <div class="dim-header">
        <div class="dim-icon" style="background:${d.bg}">${d.icon}</div>
        <div class="dim-title">${d.titulo}</div>
      </div>
      ${d.sinDatos
        ? `<div class="dim-sin-datos">Datos insuficientes — disponible con más granjas</div>`
        : `<div class="dim-rows">${d.filas.map(f => `
          <div class="dim-row">
            <div class="dim-farm-name">${f.name}</div>
            <div class="dim-bar-wrap">
              <div class="dim-bar" style="width:${f.pct}%;background:${f.barColor}"></div>
            </div>
            <div class="dim-val" style="color:${f.barColor}">${f.label}</div>
          </div>`).join('')}
        </div>`
      }
    </div>
  `).join('');

  // ── Tabla comparativa ────────────────────────────────────────────────────
  const mejorProd = granjas.reduce((a, b) => a.produccion_media > b.produccion_media ? a : b).farm_id;
  const mejorOrd  = granjas.reduce((a, b) => a.ordenos_dia > b.ordenos_dia ? a : b).farm_id;
  const mejorRech = granjas.reduce((a, b) => a.rechazos_dia < b.rechazos_dia ? a : b).farm_id;
  const mejorInc  = granjas.reduce((a, b) => a.incompletos_dia < b.incompletos_dia ? a : b).farm_id;

  const tablaRows = granjas.map(g => `
    <tr>
      <td><strong>${g.name}</strong></td>
      <td class="${g.farm_id === mejorProd ? 'mejor' : 'peor'}">${fmt(g.produccion_media)} kg</td>
      <td class="${g.farm_id === mejorOrd ? 'mejor' : 'peor'}">${fmt(g.ordenos_dia)}</td>
      <td class="${g.farm_id === mejorRech ? 'mejor' : 'peor'}">${fmt(g.rechazos_dia)}</td>
      <td class="${g.farm_id === mejorInc ? 'mejor' : 'peor'}">${fmt(g.incompletos_dia)}</td>
      <td><strong>${fmt(g.score_global, 0)}</strong></td>
    </tr>
  `).join('');

  document.getElementById('contenido').innerHTML = `
    <div class="scores">${scoresHTML}</div>

    <div class="dimensiones">
      <h2>Análisis por dimensión</h2>
      <div class="dim-grid">${dimsHTML}</div>
    </div>

    <div class="tabla-wrap">
      <h2>Comparativa detallada</h2>
      <table>
        <thead>
          <tr>
            <th>Granja</th>
            <th>Producción</th>
            <th>Ordeños/día</th>
            <th>Rechazos/día</th>
            <th>Incompletos/día</th>
            <th>Score global</th>
          </tr>
        </thead>
        <tbody>${tablaRows}</tbody>
      </table>
    </div>
  `;
});
</script>
</body>
</html>
