<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchmark — Milking Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --verde:      #1A7A4A;
    --verde-bg:   #E8F5EE;
    --amber:      #D97706;
    --amber-bg:   #FEF3C7;
    --rojo:       #DC2626;
    --rojo-bg:    #FEE2E2;
    --gris:       #6B7280;
    --gris-light: #F3F4F6;
    --negro:      #111827;
    --blanco:     #FFFFFF;
    --borde:      #E5E7EB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #F9FAFB; color: var(--negro); min-height: 100vh; }

  /* NAV */
  nav { background: var(--blanco); border-bottom: 1px solid var(--borde); padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 32px; }
  .nav-brand { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--verde); text-decoration: none; margin-right: auto; }
  nav a { font-size: 14px; font-weight: 500; color: var(--gris); text-decoration: none; padding: 4px 0; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
  nav a:hover { color: var(--negro); }
  nav a.active { color: var(--verde); border-bottom-color: var(--verde); }

  /* PAGE */
  .page { max-width: 860px; margin: 0 auto; padding: 40px 24px 64px; }

  /* HEADER */
  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-family: 'DM Serif Display', serif; font-size: 30px; font-weight: 400; margin-bottom: 12px; }
  .selector-wrap { display: flex; align-items: center; gap: 10px; }
  .selector-wrap label { font-size: 13px; color: var(--gris); }
  select {
    padding: 6px 12px; border: 1px solid var(--borde); border-radius: 8px;
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    background: var(--blanco); color: var(--negro); cursor: pointer;
  }

  /* SCORE HERO */
  .score-hero {
    background: var(--blanco); border: 1px solid var(--borde);
    border-radius: 20px; padding: 32px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 32px;
    position: relative; overflow: hidden;
  }
  .score-hero::before {
    content: ''; position: absolute; top: 0; left: 0; bottom: 0;
    width: 5px; background: var(--verde); border-radius: 20px 0 0 20px;
  }
  .score-big { font-family: 'DM Serif Display', serif; font-size: 80px; line-height: 1; color: var(--verde); flex-shrink: 0; }
  .score-info { flex: 1; }
  .score-farm { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .score-desc { font-size: 14px; color: var(--gris); margin-bottom: 16px; }
  .score-prod { font-size: 28px; font-weight: 600; }
  .score-prod span { font-size: 14px; font-weight: 400; color: var(--gris); }
  .score-vs { font-size: 13px; color: var(--gris); margin-top: 4px; }
  .score-vs strong { font-weight: 600; }
  .score-vs.arriba strong { color: var(--verde); }
  .score-vs.abajo strong { color: var(--rojo); }

  /* DIMENSIONES */
  .dims-title { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; margin-bottom: 16px; }
  .dims { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }

  .dim {
    background: var(--blanco); border: 1px solid var(--borde);
    border-radius: 14px; padding: 20px 24px;
    border-left: 4px solid var(--borde);
  }
  .dim.verde { border-left-color: var(--verde); }
  .dim.amber { border-left-color: var(--amber); }
  .dim.rojo  { border-left-color: var(--rojo); }
  .dim.gris  { border-left-color: var(--gris-light); }

  .dim-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 14px; }
  .dim-badge {
    padding: 3px 10px; border-radius: 20px; font-size: 11px;
    font-weight: 700; letter-spacing: 0.06em; flex-shrink: 0; margin-top: 2px;
  }
  .dim-badge.verde { background: var(--verde-bg); color: var(--verde); }
  .dim-badge.amber { background: var(--amber-bg); color: var(--amber); }
  .dim-badge.rojo  { background: var(--rojo-bg);  color: var(--rojo); }
  .dim-badge.gris  { background: var(--gris-light); color: var(--gris); }

  .dim-texto { flex: 1; }
  .dim-nombre { font-size: 13px; font-weight: 600; color: var(--gris); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
  .dim-mejora { font-size: 14px; color: var(--negro); line-height: 1.5; }
  .dim-val-wrap { text-align: right; flex-shrink: 0; }
  .dim-val { font-size: 22px; font-weight: 700; }
  .dim-val-sub { font-size: 12px; color: var(--gris); }

  /* BARRA */
  .dim-track-wrap { position: relative; padding-top: 16px; }
  .dim-track { height: 10px; background: var(--gris-light); border-radius: 5px; position: relative; }
  .dim-bar { height: 100%; border-radius: 5px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }
  .media-line { position: absolute; top: -14px; display: flex; flex-direction: column; align-items: center; transform: translateX(-50%); }
  .media-line-bar { width: 2px; height: 24px; background: var(--negro); opacity: 0.2; border-radius: 1px; }
  .media-line-label { font-size: 9px; color: var(--gris); white-space: nowrap; letter-spacing: 0.05em; margin-bottom: 2px; }
  .dim-sin-datos { font-size: 13px; color: var(--gris); font-style: italic; }

  .loading { text-align: center; padding: 80px; color: var(--gris); }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="dashboard.html">Milking Intelligence</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="vacas.html">Vacas</a>
  <a href="robots.html">Robots</a>
  <a href="benchmark.html" class="active">Benchmark</a>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Mi benchmark</h1>
    <div class="selector-wrap">
      <label>Granja:</label>
      <select id="selector"></select>
    </div>
  </div>
  <div id="contenido"><div class="loading">Cargando...</div></div>
</div>

<script>
const API = 'https://milking-intelligence-production.up.railway.app';

function fmt(v, d = 2) {
  if (v === null || v === undefined) return '—';
  return Number(v).toFixed(d);
}

function calcPct(val, vals, inverso) {
  const validos = vals.filter(v => v !== null && v !== undefined);
  if (validos.length < 2) return 50;
  const max = Math.max(...validos);
  const min = Math.min(...validos);
  if (max === min) return 50;
  const pct = ((val - min) / (max - min)) * 100;
  return Math.round(inverso ? 100 - pct : pct);
}

function calcMedia(vals) {
  const v = vals.filter(x => x !== null && x !== undefined);
  if (!v.length) return null;
  return v.reduce((a, b) => a + b, 0) / v.length;
}

function calcMediaPct(vals, inverso) {
  const med = calcMedia(vals);
  if (med === null) return 50;
  return calcPct(med, vals, inverso);
}

function estado(pct) {
  if (pct >= 66) return 'verde';
  if (pct >= 33) return 'amber';
  return 'rojo';
}

function mejora(nombre, val, media, pct, inverso, unidad, campo) {
  if (val === null || val === undefined) return 'Sin datos suficientes para esta dimensión.';
  const diff = Math.abs(val - media).toFixed(2);
  const arriba = inverso ? val < media : val > media;

  const textos = {
    produccion: {
      verde: `Producción por encima de la media del grupo. Buen rendimiento general del rebaño.`,
      amber: `Producción próxima a la media. Revisar curvas de lactación y ajuste de alimentación.`,
      rojo:  `Producción ${diff} kg por debajo de la media. Analizar vacas con rendimiento relativo bajo y revisar protocolo de alimentación.`,
    },
    ordenos: {
      verde: `Frecuencia de ordeño por encima de la media. El robot está siendo bien utilizado.`,
      amber: `Frecuencia de ordeño cercana a la media. Comprobar acceso al robot y tiempos de espera.`,
      rojo:  `Ordeños por vaca por debajo de la media. Revisar vacas con menos de 2 visitas/día y posibles bloqueos de acceso al robot.`,
    },
    rechazos: {
      verde: `Tasa de rechazo baja. El robot gestiona bien el flujo de animales.`,
      amber: `Rechazos ligeramente por encima de la media. Revisar configuración de tiempos mínimos entre ordeños.`,
      rojo:  `Rechazos elevados respecto al grupo. Revisar intervalo mínimo entre ordeños y vacas que visitan el robot demasiado pronto.`,
    },
    incompletos: {
      verde: `Pocos ordeños incompletos. Las vacas terminan bien el proceso.`,
      amber: `Ordeños incompletos cercanos a la media. Vigilar vacas con más del 10% de incompletos.`,
      rojo:  `Ordeños incompletos por encima de la media. Revisar vacas que abandonan el robot antes de tiempo y conductividad.`,
    },
    kickoffs: {
      verde: `Tasa de kickoffs baja. Las vacas toleran bien el proceso de ordeño.`,
      amber: `Kickoffs cercanos a la media. Revisar vacas con más del 10% de patadas.`,
      rojo:  `Kickoffs elevados respecto al grupo. Posibles problemas de ubre, dolor o estrés. Priorizar revisión veterinaria de las vacas con más incidencias.`,
    },
    celulas: {
      verde: `Células somáticas por debajo de la media. Buena salud mamaria del rebaño.`,
      amber: `Células somáticas cercanas a la media. Monitorizar vacas con tendencia creciente.`,
      rojo:  `Células somáticas elevadas. Riesgo de mastitis subclínica. Revisar vacas con valores superiores a 300.000.`,
    },
    grasa: {
      verde: `Contenido en grasa por encima de la media. Buena calidad de leche.`,
      amber: `Grasa cercana a la media del grupo.`,
      rojo:  `Grasa por debajo de la media. Revisar balance energético y composición de la ración.`,
    },
    proteina: {
      verde: `Proteína por encima de la media. Buena calidad de leche.`,
      amber: `Proteína cercana a la media del grupo.`,
      rojo:  `Proteína por debajo de la media. Revisar aporte de proteína en la ración y estado sanitario general.`,
    },
  };

  const t = textos[campo];
  if (!t) return '';
  const e = estado(pct);
  return t[e] || '';
}

function renderDim(titulo, campo, granja, allGranjas, getVal, inverso, unidad) {
  const vals = allGranjas.map(g => getVal(g));
  const val = getVal(granja);
  const med = calcMedia(vals);
  const todosNull = vals.every(v => v === null || v === undefined);

  if (todosNull || val === null || val === undefined) return `
    <div class="dim gris">
      <div class="dim-top">
        <div class="dim-badge gris">SIN DATOS</div>
        <div class="dim-texto">
          <div class="dim-nombre">${titulo}</div>
          <div class="dim-mejora">Datos insuficientes — disponible con más granjas conectadas.</div>
        </div>
      </div>
    </div>`;

  const pct = calcPct(val, vals, inverso);
  const est = estado(pct);
  const medPct = calcMediaPct(vals, inverso);
  const barPct = Math.max(2, pct);
  const col = est === 'verde' ? 'var(--verde)' : est === 'amber' ? 'var(--amber)' : 'var(--rojo)';
  const label = est === 'verde' ? 'BIEN' : est === 'amber' ? 'MEJORABLE' : 'ATENCIÓN';
  const mejoras = mejora(titulo, val, med, pct, inverso, unidad, campo);
  const diffNum = med !== null ? (inverso ? med - val : val - med) : null;
  const diffText = diffNum !== null
    ? (diffNum >= 0 ? `+${Math.abs(diffNum).toFixed(2)}` : `-${Math.abs(diffNum).toFixed(2)}`) + ` ${unidad} vs media`
    : '';

  return `<div class="dim ${est}">
    <div class="dim-top">
      <div class="dim-badge ${est}">${label}</div>
      <div class="dim-texto">
        <div class="dim-nombre">${titulo}</div>
        <div class="dim-mejora">${mejoras}</div>
      </div>
      <div class="dim-val-wrap">
        <div class="dim-val" style="color:${col}">${fmt(val)}</div>
        <div class="dim-val-sub">${unidad} · p${pct}</div>
        ${diffText ? `<div class="dim-val-sub" style="margin-top:2px">${diffText}</div>` : ''}
      </div>
    </div>
    <div class="dim-track-wrap">
      <div class="dim-track">
        <div class="dim-bar" style="width:${barPct}%;background:${col}"></div>
        <div class="media-line" style="left:${medPct}%">
          <span class="media-line-label">MEDIA</span>
          <div class="media-line-bar"></div>
        </div>
      </div>
    </div>
  </div>`;
}

let todosGranjas = [];

function renderGranja(farmId) {
  const granja = todosGranjas.find(g => g.farm_id === farmId);
  if (!granja) return;

  const med = calcMedia(todosGranjas.map(g => g.produccion_media));
  const diffProd = granja.produccion_media !== null && med !== null
    ? (granja.produccion_media - med).toFixed(2) : null;
  const arriba = diffProd !== null && parseFloat(diffProd) >= 0;

  const scoreHero = `
    <div class="score-hero">
      <div class="score-big">${fmt(granja.score_global, 0)}</div>
      <div class="score-info">
        <div class="score-farm">${granja.name}</div>
        <div class="score-desc">Puntuación global / 100 · ${todosGranjas.length} granjas en el grupo</div>
        <div class="score-prod">${fmt(granja.produccion_media)} kg <span>/ vaca / día</span></div>
        ${diffProd !== null ? `<div class="score-vs ${arriba ? 'arriba' : 'abajo'}">
          <strong>${arriba ? '+' : ''}${diffProd} kg</strong> respecto a la media del grupo
        </div>` : ''}
      </div>
    </div>`;

  const dimsHTML = [
    renderDim('Producción', 'produccion', granja, todosGranjas, g => g.produccion_media, false, 'kg/día'),
    renderDim('Ordeños por vaca y día', 'ordenos', granja, todosGranjas, g => g.ordenos_dia, false, 'ord.'),
    renderDim('Rechazos por día', 'rechazos', granja, todosGranjas, g => g.rechazos_dia, true, 'rech.'),
    renderDim('Incompletos por día', 'incompletos', granja, todosGranjas, g => g.incompletos_dia, true, 'inc.'),
    renderDim('Kickoffs (% ordeños)', 'kickoffs', granja, todosGranjas, g => g.kickoffs_media, true, '%'),
    renderDim('Células somáticas', 'celulas', granja, todosGranjas, g => g.celulas_media, true, 'cs'),
    renderDim('Grasa', 'grasa', granja, todosGranjas, g => g.grasa_media, false, '%'),
    renderDim('Proteína', 'proteina', granja, todosGranjas, g => g.proteina_media, false, '%'),
  ].join('');

  document.getElementById('contenido').innerHTML = `
    ${scoreHero}
    <div class="dims-title">Análisis por dimensión</div>
    <div class="dims">${dimsHTML}</div>
  `;
}

fetch(`${API}/benchmark`).then(r => r.json()).then(granjas => {
  todosGranjas = granjas;
  const sel = document.getElementById('selector');
  granjas.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.farm_id;
    opt.textContent = g.name;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', e => renderGranja(e.target.value));
  if (granjas.length) renderGranja(granjas[0].farm_id);
});
</script>
</body>
</html>
